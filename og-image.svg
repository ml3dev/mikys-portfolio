<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Miky — Roblox Scripter for Hire. Clean Luau systems, scoped tight.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde4d8"/>
      <stop offset="0.55" stop-color="#faf6f0"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#ef7f5a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ef7f5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0845a"/>
      <stop offset="1" stop-color="#e96d4e"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0.1" x2="1" y2="0.9">
      <stop offset="0" stop-color="#f0845a"/>
      <stop offset="0.55" stop-color="#e96d4e"/>
      <stop offset="1" stop-color="#d66d8e"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#1e1a2a" fill-opacity="0.13"/>
    </pattern>
    <radialGradient id="dotMaskGrad" cx="0.5" cy="0.55" r="0.62">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fff" stop-opacity="1"/>
    </radialGradient>
    <mask id="dotMask">
      <rect width="1200" height="630" fill="url(#dotMaskGrad)"/>
    </mask>
    <filter id="logoShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#ef7f5a" flood-opacity="0.32"/>
    </filter>
    <filter id="chipShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1e1a2a" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#dotMask)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(478, 60)">
    <rect width="244" height="40" rx="20" fill="#d5f0e2" stroke="#5fad84" stroke-opacity="0.30"/>
    <circle cx="24" cy="20" r="5" fill="#5fad84"/>
    <circle cx="24" cy="20" r="9" fill="none" stroke="#5fad84" stroke-opacity="0.22" stroke-width="2"/>
    <text x="42" y="26" font-family="'Outfit','Inter','Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#3d8a5e" letter-spacing="0.02em">Open for commissions</text>
  </g>

  <g transform="translate(538, 134)" filter="url(#logoShadow)">
    <rect width="124" height="124" rx="32" fill="url(#coral)"/>
    <text x="62" y="93" font-family="'Outfit','Inter','Segoe UI',Arial,sans-serif" font-size="92" font-weight="900" fill="#fff" text-anchor="middle">M</text>
  </g>

  <text x="600" y="394" font-family="'Outfit','Inter','Segoe UI',Arial,sans-serif" font-size="144" font-weight="900" fill="url(#wordmark)" text-anchor="middle" letter-spacing="-0.045em">Miky</text>

  <text x="600" y="458" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="19" font-weight="500" fill="#a8a0b8" text-anchor="middle" letter-spacing="0.32em">ROBLOX SCRIPTER</text>

  <text x="600" y="514" font-family="'Outfit','Inter','Segoe UI',Arial,sans-serif" font-size="30" font-weight="500" fill="#1e1a2a" text-anchor="middle" letter-spacing="-0.005em">Clean Luau systems, scoped tight, ready to ship.</text>

  <g transform="translate(290, 558)" font-family="'Outfit','Inter','Segoe UI',Arial,sans-serif" font-size="15" font-weight="600">
    <g filter="url(#chipShadow)">
      <rect width="100" height="44" rx="14" fill="#fff" stroke="#1e1a2a" stroke-opacity="0.075"/>
      <circle cx="22" cy="22" r="5" fill="#ef7f5a"/>
      <text x="38" y="27" fill="#1e1a2a">Luau</text>
    </g>
    <g transform="translate(114, 0)" filter="url(#chipShadow)">
      <rect width="160" height="44" rx="14" fill="#fff" stroke="#1e1a2a" stroke-opacity="0.075"/>
      <circle cx="22" cy="22" r="5" fill="#8f7ec8"/>
      <text x="38" y="27" fill="#1e1a2a">Server Logic</text>
    </g>
    <g transform="translate(288, 0)" filter="url(#chipShadow)">
      <rect width="134" height="44" rx="14" fill="#fff" stroke="#1e1a2a" stroke-opacity="0.075"/>
      <circle cx="22" cy="22" r="5" fill="#5fad84"/>
      <text x="38" y="27" fill="#1e1a2a">DataStore</text>
    </g>
    <g transform="translate(436, 0)" filter="url(#chipShadow)">
      <rect width="184" height="44" rx="14" fill="#fff" stroke="#1e1a2a" stroke-opacity="0.075"/>
      <circle cx="22" cy="22" r="5" fill="#4f9ed4"/>
      <text x="38" y="27" fill="#1e1a2a">UI &amp; Networking</text>
    </g>
  </g>
</svg>
